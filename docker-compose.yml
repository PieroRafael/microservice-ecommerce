services:
  # Base de Datos para Product Service
  product-db:
    image: postgres:15-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: ${DB_NAME_PRODUCT:-product_db}
      POSTGRES_USER: ${DB_USER_PRODUCT:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD_PRODUCT:-admin}
    ports:
      - "${DB_PORT_PRODUCT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Base de Datos para Order Service
  order-db:
    image: postgres:15-alpine
    container_name: order_db
    environment:
      POSTGRES_DB: ${DB_NAME_ORDER:-order_db}
      POSTGRES_USER: ${DB_USER_ORDER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD_ORDER:-admin}
    ports:
      - "${DB_PORT_ORDER:-5432}:5432"
    volumes:
      - order_data:/var/lib/postgresql/data

  # Base de Datos para Inventory Service
  inventory-db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: ${DB_NAME_INVENTORY:-inventory_db}
      POSTGRES_USER: ${DB_USER_INVENTORY:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD_INVENTORY:-admin}
    ports:
      - "${DB_PORT_INVENTORY:-5434}:5432"
    volumes:
      - inventory_data:/var/lib/postgresql/data

  # Identity Provider (Seguridad)
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    container_name: keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080" # Mapeado al 8081 para no chocar con el Gateway (8080)

  # Interfaz gráfica para PostgreSQL (Opcional, útil para debug)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - product-db
      - order-db
      - inventory-db

  # ==========================================
  # Message Broker (Event-Driven Architecture)
  # ==========================================

  # Apache Kafka — KRaft Mode (sin Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    environment:
      # KRaft Mode — Kafka actúa como su propio controlador de metadatos
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      # Listeners: INTERNAL (Docker network) + EXTERNAL (host machine) + CONTROLLER (KRaft)
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Configuración de Topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Cluster ID generado
      CLUSTER_ID: ecommerce-kafka-cluster-01
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Kafka UI — Panel de control visual para Kafka (como pgAdmin pero para Kafka)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: cloudnative-ecommerce
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "${KAFKA_UI_PORT:-9093}:8080"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  order_data:
  inventory_data:
  kafka_data:
