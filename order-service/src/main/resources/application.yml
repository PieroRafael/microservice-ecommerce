server:
  port: 8083 # Puerto diferente para no chocar con Product (8082) ni Gateway (8080)

spring:
  application:
    name: order-service

  # Base de Datos (Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db # ¡Ojo! Base de datos distinta
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Virtual Threads
  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
