server:
  port: 8083 # Evitamos conflicto con Gateway (8080) y Config Server (8888) y Product (8082) y Discovery Server (8761)

spring:
  application:
    name: order-service
  config:
    import: "optional:configserver:http://localhost:8888/"

  # Seguridad Oauth2 (Resource Server)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/cloudnative-ecommerce

  # Database Migrations (Flyway)
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Base de Datos (Docker)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT_ORDER:5432}/${DB_NAME_ORDER:order_db}
    username: ${DB_USER_ORDER:admin}
    password: ${DB_PASSWORD_ORDER:admin}
    driver-class-name: org.postgresql.Driver
    # SSL se puede configurar aquí si es necesario (ej: url: ...?ssl=${DB_SSL_ORDER:false})

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate # Estándar profesional para producción: validate en lugar de auto-generar (comportamiento por defecto -> update (es una mala practica pero se puede usar en local))
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

  # Feign Circuit Breaker (Resilience4j)
  cloud:
    openfeign:
      circuitbreaker:
        enabled: false # Deshabilitado para usar solo @CircuitBreaker en el Adaptador (limpieza de logs)

# Configuracion de Resilience4j 
resilience4j:
  circuitbreaker:
    instances:
      productService:   # Nombre de la instancia que usaremos en la anotacion
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10              # Evalua los ultimos 10 llamados
        minimumNumberOfCalls: 5            # Necesita 5 peticiones minimo para calular la tasa de fallo
        failureRateThreshold: 50           # Si el 50% falla, el circuito se ABRE
        waitDurationInOpenState: 10s       # Tiempo de espera antes de probar de nuevo (Half-Open)
        permittedNumberOfCallsInHalfOpenState: 3 # Llamados permitidos en estado Half-Open
        automaticTransitionFromOpenToHalfOpenEnabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
