server:
  port: 8084

spring:
  application:
    name: inventory-service
  config:
    import: "optional:configserver:http://localhost:8888/"

  # Seguridad OAuth2 (Resource Server)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/cloudnative-ecommerce

  # Database Migrations (Flyway)
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: true

  # Base de Datos (Docker)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT_INVENTORY:5434}/${DB_NAME_INVENTORY:inventory_db}
    username: ${DB_USER_INVENTORY:admin}
    password: ${DB_PASSWORD_INVENTORY:admin}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

  # Kafka Config
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.cloudnative.ecommerce.*"
        "[spring.json.use.type.headers]": false
        "[isolation.level]": read_committed
    producer:
      transaction-id-prefix: tx-inventory-
      properties:
        "[enable.idempotence]": true # Garantiza que si un ACK se pierde, Kafka Broker evite mensajes duplicados (EOS Native)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
