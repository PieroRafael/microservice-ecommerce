server:
  port: 8082 # Evitamos conflicto con Gateway (8080) y Config Server (8888) y Order (8083) y Discovery Server (8761)

spring:
  application:
    name: product-service
  config:
    import: "optional:configserver:http://localhost:8888/"

  # Seguridad Oauth2 (Resource Server)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/cloudnative-ecommerce

  # Database Migrations (Flyway)
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Base de Datos (Docker)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT_PRODUCT:5433}/${DB_NAME_PRODUCT:product_db}
    username: ${DB_USER_PRODUCT:admin}
    password: ${DB_PASSWORD_PRODUCT:admin}
    driver-class-name: org.postgresql.Driver
    # SSL se puede configurar aquí si es necesario (ej: url: ...?ssl=${DB_SSL_PRODUCT:false})

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate # Estándar profesional: validar en lugar de auto-generar (comportamiento por defecto -> update (es una mala practica pero se puede usar en local))
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
